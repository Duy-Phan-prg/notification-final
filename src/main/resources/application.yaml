server:
  port: ${PORT:8096}

spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/notification_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456789}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:phanduy.prg@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:cvhd ktcd grzc qdad}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

    eureka:
      client:
        enabled: ${EUREKA_CLIENT_ENABLED:true}
        service-url:
          defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
        register-with-eureka: ${EUREKA_CLIENT_ENABLED:true}
        fetch-registry: ${EUREKA_CLIENT_ENABLED:true}
      instance:
        prefer-ip-address: false
        hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost} // khi render no cho link
        secure-port: 443
        secure-port-enabled: true
        non-secure-port-enabled: false
        home-page-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/
        status-page-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/actuator/info
        health-check-url: https://${RENDER_EXTERNAL_HOSTNAME:localhost}/actuator/health
        lease-renewal-interval-in-seconds: 10
        lease-expiration-duration-in-seconds: 30
        instance-id: ${spring.application.name}:${RENDER_EXTERNAL_HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    defaults:
      enabled: true
    db:
      enabled: false
    discovery:
      enabled: true
    mail:
      enabled: false

# CORS Configuration
cors:
  allowed-origins: "http://localhost:3000,http://localhost:8080,https://your-domain.com"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"
  max-age: 3600
